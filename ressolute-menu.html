<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html { scroll-behavior: smooth; }
  body { font-family: 'Inter', sans-serif; background: white; color: #140d26; overflow-x: hidden; min-height: 100vh; display: flex; flex-direction: column; }

  :root {
    --purple: #7847db;
    --purple-dark: #5c35b8;
    --purple-light: #e5dbff;
    --text-dark: #140d26;
    --border: #d9d9d9;
    --transition: 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* ─── NAV ─── */
  nav {
    background: white;
    border-bottom: 1px solid var(--border);
    display: flex; align-items: center; gap: 24px;
    padding: 16px 32px;
  }

  .nav-logo { display: flex; align-items: center; gap: 12px; text-decoration: none; flex-shrink: 0; transition: opacity var(--transition); }
  .nav-logo:hover { opacity: 0.82; }
      .nav-logo-img {
    height: 42px;
    width: 199px;
    object-fit: contain;
    object-position: left center;
    display: block;
    flex-shrink: 0;
  }

  /* Spacer pushes CTA group right */
  .nav-spacer { flex: 1; }

  .nav-cta-group { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

  .btn-primary {
    background: var(--purple); color: white; border: none;
    padding: 12px 24px; border-radius: 9999px;
    font-size: 15px; font-weight: 700; cursor: pointer;
    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    white-space: nowrap; text-decoration: none;
    display: inline-flex; align-items: center;
    position: relative; overflow: hidden;
  }
  .btn-primary::before { content:''; position:absolute; top:50%; left:50%; width:0; height:0; background:rgba(255,255,255,0.25); border-radius:50%; transform:translate(-50%,-50%); transition:width .5s,height .5s,opacity .5s; opacity:0; }
  .btn-primary:hover::before { width:300px; height:300px; opacity:1; }
  .btn-primary:hover { background:var(--purple-dark); transform:translateY(-2px); box-shadow:0 8px 24px rgba(120,71,219,0.38); }

  /* Close button — X icon, circle */
  .btn-close {
    width: 48px; height: 48px; border-radius: 50%;
    background: #f5f5f5; border: none; cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    flex-shrink: 0;
    transition: background var(--transition), transform var(--transition);
    font-size: 20px; color: #444;
    text-decoration: none;
  }
  .btn-close:hover { background: var(--purple-light); color: var(--purple); transform: rotate(90deg) scale(1.08); }

  /* ─── MENU CONTENT ─── */
  main {
    flex: 1;
    padding: 80px 0 120px;
    display: flex; align-items: flex-start; justify-content: center;
  }

  .menu-list {
    width: 100%; max-width: 440px;
    display: flex; flex-direction: column;
  }

  .menu-item {
    display: flex; align-items: center; justify-content: space-between;
    gap: 16px;
    padding: 22px 0;
    text-decoration: none;
    cursor: pointer;
  }
  /* Gray divider between items only — no top or bottom line */
  .menu-item + .menu-item {
    border-top: 1px solid #e0e0e0;
  }
  /* Remove divider below last item */
  .menu-item--last {
    border-bottom: none;
  }

  .menu-item-label {
    font-size: clamp(36px, 5vw, 48px);
    font-weight: 700;
    color: var(--text-dark);
    line-height: 1.1;
    transition: color var(--transition);
  }
  .menu-item:hover .menu-item-label { color: var(--purple); }

  .menu-item-icon {
    width: 40px; height: 40px; flex-shrink: 0;
    display: flex; align-items: center; justify-content: center;
    color: var(--purple);
  }

  /* Entry animation — staggered slide up */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: none; }
  }
  .menu-item:nth-child(1) { animation: slideUp .5s ease .05s both; }
  .menu-item:nth-child(2) { animation: slideUp .5s ease .12s both; }
  .menu-item:nth-child(3) { animation: slideUp .5s ease .19s both; }
  .menu-item:nth-child(4) { animation: slideUp .5s ease .26s both; }
  .menu-item:nth-child(5) { animation: slideUp .5s ease .33s both; }

  /* ─── FOOTER ─── */
  .footer-inner { max-width: 1250px; width: 100%; margin: 0 auto; }
  footer {
    background: #434343;
    padding: 40px 40px 60px;
    color: rgba(255,255,255,0.6);
  }
  .footer-top { display: grid; grid-template-columns: repeat(4, 1fr); gap: 32px; align-items: flex-start; }
  .footer-brand { display: flex; flex-direction: row; align-items: center; gap: 14px; flex-wrap: wrap; }
  .footer-logo-box {
    width: 36px; height: 36px; background: var(--purple); border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    transition: transform var(--transition), box-shadow var(--transition); cursor: pointer;
  }
  .footer-logo-box:hover { transform: scale(1.1) rotate(-5deg); box-shadow: 0 6px 18px rgba(120,71,219,0.4); }
  .footer-socials { display: flex; gap: 14px; align-items: center; }
  .social-icon {
    width: 36px; height: 36px; border-radius: 8px;
    display: flex; align-items: center; justify-content: center;
    background: rgba(255,255,255,0.08);
    transition: background var(--transition), transform var(--transition), box-shadow var(--transition);
    cursor: pointer; color: rgba(255,255,255,0.7); text-decoration: none;
  }
  .social-icon:hover { background: var(--purple); transform: translateY(-4px) scale(1.1); box-shadow: 0 6px 16px rgba(120,71,219,0.5); color: white; }
  .footer-col { display: flex; flex-direction: column; gap: 10px; }
  .footer-col-title { color: white; font-weight: 600; font-size: 15px; margin-bottom: 6px; }
  .footer-link { font-size: 14px; color: rgba(255,255,255,0.55); text-decoration: none; transition: color var(--transition), padding-left var(--transition); cursor: pointer; }
  .footer-link:hover { color: white; padding-left: 4px; }
  .footer-divider { height: 1px; background: rgba(255,255,255,0.15); margin: 32px 0; }
  .footer-bottom { display: flex; justify-content: space-between; align-items: center; font-size: 12px; color: rgba(255,255,255,0.5); flex-wrap: wrap; gap: 8px; }

  /* ─── Mobile ─── */
  @media (max-width: 768px) {
    nav { padding: 14px 20px; }
    .nav-logo {
      width: 39px;
      overflow: hidden;
      flex-shrink: 0;
    }
    .nav-logo-img {
      height: 42px;
      width: 202px;
      object-fit: none;
      object-position: left center;
      flex-shrink: 0;
    }
    main { padding: 48px 24px 80px; justify-content: flex-start; }
    .menu-list { max-width: 100%; }
    .menu-item-label { font-size: 36px; }
    .footer-top { grid-template-columns: 1fr 1fr; gap: 24px; }
  }
</style>
</head>
